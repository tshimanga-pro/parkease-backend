<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battery Services</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body class="register-page">
    <div class="nav-set">
      <nav class="navbar">
        <div class="logo">ParkEase</div>
        <ul class="nav-links">
          <li><a href="tyreClinic.html">Tyre Clinic</a></li>
        </ul>
        <div class="nav-right">
          <a href="dashboardManeger.html" class="logout-btn">Logout</a>
        </div>
      </nav>
      <div class="form-card">
        <h2>Battery Hire and Sale Service</h2>
        <form id="batteryForm">
          <div class="form-group" id="numberPlate" name="numberPlate">
            <label for="numberPlate">Number Plate</label>
          <input
            type="text"
            id="numberPlate"
            name="numberPlate"
            placeholder="Enter Ugandan plate number"
            pattern="^U[A-Z]{2}\s?[0-9]{1,4}[A-Z]?$"
            title="Must start with U and use Ugandan plate format, e.g. UAX 123A"
            required
          />
          </div>

          <div class="form-group">
            <label for="batteryType">Battery Type</label>
            <select id="batteryType" name="batteryType" name="batteryType">
              <option value="">-- Select Type --</option>
              <option value="12V Car">12V Car Battery</option>
              <option value="24V Truck">24V Truck Battery</option>
              <option value="12V Motorcycle">12V Motorcycle Battery</option>
            </select>
          </div>
          <div class="form-group">
            <label for="batteryType">Battery Brand</label>
            <select id="batteryBrand" name="batteryBrand" name="batteryBrand">
              <option value="">-- Select Brand --</option>
              <option value="Amaron">Amaron</option>
              <option value="Bosch">Bosch</option>
              <option value="Exide">Exide</option>
              <option value="Rocket">Rocket</option>
              <option value="Yuasa">Yuasa</option>
            </select>
          </div>
          <div class="form-group">
            <label for="serviceType">Service Type</label>
            <select id="serviceType" name="serviceType" name="serviceType">
              <option value="">-- Select Service --</option>
              <option value="hire">Hire</option>
              <option value="sale">Sale</option>
            </select>
          </div>
          <div class="form-group" id="daysGroup" style="display: none">
            <label for="days">Number of Days</label>
            <input type="number" id="days" name="days" min="1" value="1" />
          </div>
          <button type="button" id="calculateBtn" class="btn">
            Calculate Charges
          </button>
        </form>
      </div>
    </div>
    <script>
      const STORAGE_KEY = "parkEaseBatteryTransactions";

      let hireTotal = 0;
      let saleTotal = 0;

      const batteryPrices = {
        hire: {
          "12V Car": 5000, // per day
          "24V Truck": 10000,
          "12V Motorcycle": 3000,
        },
        sale: {
          "12V Car": 150000,
          "24V Truck": 300000,
          "12V Motorcycle": 50000,
        },
      };

      function getBatteryTransactions() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function saveBatteryTransactions(transactions) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
      }

      function addBatteryTransaction(transaction) {
        const transactions = getBatteryTransactions();
        transactions.push(transaction);
        saveBatteryTransactions(transactions);
      }

      document
        .getElementById("serviceType")
        .addEventListener("change", function () {
          const serviceType = this.value;
          const daysGroup = document.getElementById("daysGroup");
          if (serviceType === "hire") {
            daysGroup.style.display = "block";
          } else {
            daysGroup.style.display = "none";
          }
        });

      document
        .getElementById("calculateBtn")
        .addEventListener("click", function () {
          const type = document.getElementById("batteryType").value;
          const service = document.getElementById("serviceType").value;
          const days = parseInt(document.getElementById("days").value) || 1;

          if (!type || !service) {
            alert("Please select battery type and service type.");
            return;
          }

          let price = batteryPrices[service][type];
          if (service === "hire") {
            price *= days;
          }

          const transaction = {
            batteryType: type,
            serviceType: service,
            days: service === "hire" ? days : 0,
            price,
            createdAt: new Date().toISOString(),
          };
          addBatteryTransaction(transaction);
        });
    </script>
  </body>
</html>
