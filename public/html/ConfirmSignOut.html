  <body class="signOut-page">
    <div class="nav-set">
      <nav class="navbar">
        <div class="logo">ParkEase</div>

        <ul class="nav-links">
          <li>
            <!-- <a href="vehicleRegistration.html" class="register-link">Register Vehicle</a> -->

        <div class="nav-right">
          <span class="user-role">Parking Attendant</span>
          <a href="attendantDashboard.html" class="logout-btn">Logout</a>
        </div>
      </nav>
      <div class="form-card">
        <h2>Vehicle Confirm Sign Out</h2>

        <form id="signOutForm" novalidate>
          <div id="formMessage" class="form-message" aria-live="polite"></div>

          <label for="arrivalTime">Arrival Time</label>
          <input type="time" id="arrivalTime" name="arrivalTime" />
          <label for="date">Date</label>
          <input type="date" id="date" name="date" />
          <label for="receiverName">Receiver Name</label>
          <input type="text" id="receiverName" name="receiverName" />
          <label for="phoneNumber">Client Phone Number</label>
          <input
            type="tel"
            id="phoneNumber"
            name="phoneNumber"
            pattern="[0-9]{10}"
            title="10 digit phone number"
          />
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">--Select--</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
          <label for="ninNumber">NIN Number</label>
          <input
            type="text"
            id="ninNumber"
            name="ninNumber"
            pattern="[0-9]{8,10}"
            title="8–10 digit NIN"
          />

          <button type="submit" class="btn-submit">Sign Out</button>
        </form>
      </div>
    </div>
    <script src="signOut.js"></script>
  </body>
</html>
